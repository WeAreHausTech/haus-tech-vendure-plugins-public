name: Sync Plugin Markdown Files

on:
  push:
    branches:
      - main
    paths:
      - 'packages/**/*.md'
      - 'packages/**/assets/**'
  workflow_dispatch:
    inputs:
      forceFullSync:
        description: 'Force a full sync of all markdown files'
        required: false
        default: 'false'

jobs:
  sync-md:
    runs-on: ubuntu-latest
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN}}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable --check-cache

      - name: Audit dependencies
        continue-on-error: true
        run: yarn npm audit -A -R --severity high --environment production
      - name: Update README versions with package.json
        run: yarn update-readmes

      - name: Set up SSH for wearehaustech.github.io
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.WEAREHAUSTECH_GITHUB_IO_DEPLOY_KEY }}

      - name: Clone wearehaustech.github.io
        run: |
          git clone git@github.com:WeAreHausTech/wearehaustech.github.io.git ../wearehaustech.github.io

      - name: Copy changed Markdown files
        run: |
          set -euo pipefail
          DEST_DIR="../wearehaustech.github.io/docs/vendure-plugins"
          mkdir -p "$DEST_DIR"

          FULL_SYNC=false
          if [ "${{ github.event.inputs.forceFullSync }}" = "true" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            FULL_SYNC=true
          fi

          if [ "$FULL_SYNC" = true ]; then
            echo "Full sync requested — syncing all markdown files."
            CHANGED_FILES=$(find packages -type f -name "*.md")
          else
            BEFORE="${{ github.event.before }}"
            AFTER="${{ github.sha }}"
            CHANGED_FILES=$(git diff --name-only "$BEFORE" "$AFTER" | grep -E '^packages/.*\.md$' || true)
          fi

          DELETED_FILES=""
          if [ "$FULL_SYNC" = false ]; then
            DELETED_FILES=$(git diff --name-only --diff-filter=D "$BEFORE" "$AFTER" | grep -E '^packages/.*\.md$' || true)
          fi

          if [ -z "$CHANGED_FILES" ] && [ -z "$DELETED_FILES" ] && [ "$FULL_SYNC" = false ]; then
            ASSET_CHANGED_PLUGINS=$(git diff --name-only "$BEFORE" "$AFTER" | grep -E '^packages/[^/]+/assets/' | cut -d'/' -f2 | sort -u || true)
            if [ -z "$ASSET_CHANGED_PLUGINS" ]; then
              echo "No changed markdown files or assets to process."
            else
              for plugin_name in $ASSET_CHANGED_PLUGINS; do
                if [ -d "packages/$plugin_name/assets" ]; then
                  mkdir -p "$DEST_DIR/$plugin_name/assets"
                  rsync -a --delete "packages/$plugin_name/assets/" "$DEST_DIR/$plugin_name/assets/"
                elif [ -d "$DEST_DIR/$plugin_name/assets" ]; then
                  echo "Removing orphaned assets for $plugin_name"
                  rm -rf "$DEST_DIR/$plugin_name/assets"
                fi
              done
            fi
          else
            for file in $CHANGED_FILES; do
              [ -f "$file" ] || continue
              echo "Processing $file"
              plugin_name=$(echo "$file" | cut -d'/' -f2)
              mkdir -p "$DEST_DIR/$plugin_name"
              cp "$file" "$DEST_DIR/$plugin_name/"
              if [ -d "packages/$plugin_name/assets" ]; then
                mkdir -p "$DEST_DIR/$plugin_name/assets"
                rsync -a --delete "packages/$plugin_name/assets/" "$DEST_DIR/$plugin_name/assets/"
              elif [ -d "$DEST_DIR/$plugin_name/assets" ]; then
                echo "Removing orphaned assets for $plugin_name"
                rm -rf "$DEST_DIR/$plugin_name/assets"
              fi
            done

            for file in $DELETED_FILES; do
              plugin_name=$(echo "$file" | cut -d'/' -f2)
              readme_name=$(basename "$file")
              dest_file="$DEST_DIR/$plugin_name/$readme_name"
              if [ -f "$dest_file" ]; then
                echo "Deleting removed markdown file $dest_file"
                rm -f "$dest_file"
              fi
            done

            if [ "$FULL_SYNC" = true ]; then
              for plugin_dir in "$DEST_DIR"/*/; do
                [ -d "$plugin_dir" ] || continue
                plugin="$(basename "$plugin_dir")"
                if [ ! -f "packages/$plugin/README.md" ]; then
                  echo "Removing orphaned plugin docs directory $plugin_dir"
                  rm -rf "$plugin_dir"
                fi
              done
            fi
          fi

      - name: Commit and Push to wearehaustech.github.io
        run: |
          cd ../wearehaustech.github.io
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "docs(vendure-plugins): sync markdown files" || echo "No changes to commit"
          git push
