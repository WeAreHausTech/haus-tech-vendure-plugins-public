name: Update READMEs

on:
  push:
    branches:
      - main
    paths:
      - 'packages/**/package.json'
  workflow_dispatch:

jobs:
  update-readmes:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Yarn
        run: corepack prepare yarn@4.9.0 --activate

      - name: Install dependencies
        run: yarn install --immutable

      - name: Run update-readmes script
        run: yarn update-readmes

      - name: Check for changes
        id: changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add packages/**/README.md packages/**/README.mdx
          git commit -m "chore: update README versions to match package.json [skip ci]"
          git push
