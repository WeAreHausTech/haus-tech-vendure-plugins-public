name: Update READMEs version

on:
  push:
    branches:
      - main
    paths:
      - 'packages/**/package.json'
  workflow_dispatch:

jobs:
  update-readmes:
    runs-on: ubuntu-latest
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Yarn
        run: corepack prepare yarn@4.9.0 --activate

      - name: Install dependencies
        run: yarn install --immutable

      - name: Run update-readmes script
        run: yarn update-readmes

      - name: Check for changes
        id: changes
        run: |
          if [ -n "$(git status --porcelain -- ':(glob)packages/**/README.md' ':(glob)packages/**/README.mdx')" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          changed_files="$(git status --porcelain -- ':(glob)packages/**/README.md' ':(glob)packages/**/README.mdx' | awk '{print $2}')"

          if [ -z "$changed_files" ]; then
            echo "No README files to stage; skipping commit"
            exit 0
          fi

          while IFS= read -r file; do
            [ -n "$file" ] && git add -A -- "$file"
          done <<< "$changed_files"

          git commit -m "chore: update README versions to match package.json [skip ci]"
          git push

      - name: No README changes
        if: steps.changes.outputs.has_changes == 'false'
        run: echo "No READMEs to update"
