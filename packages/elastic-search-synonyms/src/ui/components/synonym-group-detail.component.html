<vdr-page-block>
  <vdr-action-bar>
    <vdr-ab-left></vdr-ab-left>
    <vdr-ab-right>
      <button
        class="button primary"
        *ngIf="isNew$ | async; else updateButton"
        (click)="create()"
        [disabled]="detailForm.pristine || detailForm.invalid"
      >
        {{ 'common.create' | translate }}
      </button>
      <ng-template #updateButton>
        <button
          class="btn btn-primary"
          (click)="update()"
          [disabled]="detailForm.pristine || detailForm.invalid"
        >
          {{ 'common.update' | translate }}
        </button>
      </ng-template>
    </vdr-ab-right>
  </vdr-action-bar>
</vdr-page-block>

<form class="form" [formGroup]="detailForm">
  <vdr-page-detail-layout>
    <vdr-page-detail-sidebar>
      <vdr-card *ngIf="entity$ | async as entity">
        <vdr-page-entity-info [entity]="entity" />
      </vdr-card>
    </vdr-page-detail-sidebar>

    <vdr-page-block>
      <vdr-card>
        <div>
          <label class="block text-sm mb-1">{{ 'synonyms.detail.synonyms' | translate }}</label>
          <div class="flex flex-wrap gap-2 mb-2" style="flex-wrap: wrap">
            <vdr-chip
              *ngFor="let tag of synonyms; let i = index"
              class="flex items-center gap-2 mb-1"
            >
              <span>{{ tag }}</span>
              <clr-icon shape="remove" (click)="removeTag(i)" style="cursor: pointer"></clr-icon>
            </vdr-chip>
          </div>
          <div class="flex flex-col gap-2 items-start">
            <div class="flex gap-2 items-center">
              <input
                class="form-control"
                style="width: 420px; margin-right: 10px"
                formControlName="newTag"
                placeholder=""
                (keydown)="onTagKeydown($event)"
                [placeholder]="'synonyms.detail.addLabel' | translate"
              />
              <button
                type="button"
                class="btn btn-secondary"
                (click)="addTagFromInput()"
                [disabled]="!newTag || !newTag.trim()"
              >
                {{ 'synonyms.detail.add' | translate }}
              </button>
            </div>
          </div>
        </div>
        <!-- Actions moved to header action bar to match Vendure styling -->
      </vdr-card>
    </vdr-page-block>
  </vdr-page-detail-layout>
</form>
